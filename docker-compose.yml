services:
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: ml-frontend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    depends_on:
      - api-gateway
    networks:
      - ml-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: ml-api-gateway
    environment:
      INCIDENT_SERVICE_URL: http://incident-inference-service:8000
      SUPPORT_SERVICE_URL: http://support-inference-service:8000
      SEGMENTATION_SERVICE_URL: http://segmentation-inference-service:8000
      ANOMALY_SERVICE_URL: http://anomaly-inference-service:8000
    ports:
      - "${API_GATEWAY_PORT:-8001}:8000"
    depends_on:
      - incident-inference-service
      - support-inference-service
      - segmentation-inference-service
      - anomaly-inference-service
    networks:
      - ml-network

  incident-inference-service:
    build:
      context: .
      dockerfile: services/incident-inference-service/Dockerfile
    container_name: ml-incident-inference-service
    volumes:
      - ./models:/models
    networks:
      - ml-network

  support-inference-service:
    build:
      context: .
      dockerfile: services/support-inference-service/Dockerfile
    container_name: ml-support-inference-service
    volumes:
      - ./models:/models
    networks:
      - ml-network

  segmentation-inference-service:
    build:
      context: .
      dockerfile: services/segmentation-inference-service/Dockerfile
    container_name: ml-segmentation-inference-service
    volumes:
      - ./models:/models
    networks:
      - ml-network

  anomaly-inference-service:
    build:
      context: .
      dockerfile: services/anomaly-inference-service/Dockerfile
    container_name: ml-anomaly-inference-service
    volumes:
      - ./models:/models
    networks:
      - ml-network

  model-storage:
    build:
      context: ./services/model-storage
    container_name: ml-model-storage
    volumes:
      - ./models:/models
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge
