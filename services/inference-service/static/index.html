<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Incident Risk Inference</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 980px; margin: 32px auto; padding: 0 16px; background: #f6f7fb; color: #1f2937; }
      h1 { margin-bottom: 8px; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
      form { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      label { display: grid; gap: 4px; font-size: 13px; font-weight: 600; }
      input, select { padding: 9px; border: 1px solid #cbd5e1; border-radius: 8px; font: inherit; }
      button { grid-column: 1 / -1; padding: 12px; border: 0; border-radius: 8px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
      button:hover { background: #1d4ed8; }
      pre { white-space: pre-wrap; background: #0f172a; color: #d1fae5; padding: 16px; border-radius: 10px; overflow-x: auto; }
      .result { font-size: 20px; font-weight: 700; }
      @media (max-width: 760px) { form { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Incident Risk Inference</h1>
    <p>Simple UI to call <code>/predict</code> with one server observation.</p>

    <section class="card">
      <button id="risky-example" type="button">Fill risky example</button>
      <form id="prediction-form">
        <label>Date <input name="date" value="2026-03-17" /></label>
        <label>Server ID <input name="server_id" value="S000000" /></label>
        <label>Server Type
          <select name="server_type"><option>vps</option><option>dedicated</option><option>gpu</option><option>storage</option><option>database</option></select>
        </label>
        <label>Region <select name="region"><option>waw</option><option>rbx</option><option>sbg</option><option>bhs</option><option>gra</option><option>lim</option><option>eri</option></select></label>
        <label>OS <select name="os_family"><option>linux</option><option>windows</option><option>managed</option></select></label>
        <label>Segment <select name="segment"><option>startup</option><option>sme</option><option>enterprise</option><option>public_sector</option><option>reseller</option></select></label>
        <label>Country <select name="country"><option>FR</option><option>DE</option><option>UK</option><option>BE</option><option>ES</option></select></label>
        <label>Support Plan <select name="support_plan"><option>basic</option><option>standard</option><option>premium</option><option>critical</option></select></label>

        <label>CPU Cores <input name="cpu_cores" type="number" value="8" /></label>
        <label>RAM GB <input name="ram_gb" type="number" value="16" /></label>
        <label>Disk TB <input name="disk_tb" type="number" step="0.01" value="2.0" /></label>
        <label>Age Days <input name="age_days" type="number" value="1339" /></label>
        <label>Has GPU <input name="has_gpu" type="number" min="0" max="1" value="0" /></label>
        <label>Managed <input name="is_managed" type="number" min="0" max="1" value="0" /></label>

        <label>CPU % <input name="cpu_util_pct" type="number" step="0.01" value="82.84" /></label>
        <label>RAM % <input name="ram_util_pct" type="number" step="0.01" value="46.65" /></label>
        <label>Disk % <input name="disk_util_pct" type="number" step="0.01" value="28.8" /></label>
        <label>Net In GB <input name="net_in_gb" type="number" step="0.01" value="249.31" /></label>
        <label>Net Out GB <input name="net_out_gb" type="number" step="0.01" value="191.95" /></label>
        <label>Temperature C <input name="temperature_c" type="number" step="0.01" value="63.74" /></label>
        <label>Backup Success <input name="backup_success" type="number" min="0" max="1" value="1" /></label>
        <label>Maintenance <input name="scheduled_maintenance" type="number" min="0" max="1" value="0" /></label>
        <label>Rack Temp C <input name="avg_rack_temperature_c" type="number" step="0.01" value="53.59" /></label>
        <label>Power MW <input name="power_usage_mw" type="number" step="0.001" value="0.65" /></label>
        <label>Latency MS <input name="network_latency_ms" type="number" step="0.01" value="23.24" /></label>
        <label>Support Tickets <input name="support_tickets" type="number" value="5" /></label>
        <label>Capacity % <input name="capacity_used_pct" type="number" step="0.01" value="66.77" /></label>
        <label>Contract Months <input name="contract_months" type="number" value="36" /></label>
        <label>Tenure Days <input name="tenure_days" type="number" value="1197" /></label>
        <label>Monthly Spend EUR <input name="monthly_spend_eur" type="number" step="0.01" value="130.34" /></label>

        <button type="submit">Run inference</button>
      </form>
    </section>

    <section class="card">
      <div id="summary" class="result">No prediction yet.</div>
      <pre id="output"></pre>
    </section>

    <script>
      const numericFields = new Set([
        "cpu_cores", "ram_gb", "disk_tb", "age_days", "has_gpu", "is_managed", "cpu_util_pct", "ram_util_pct",
        "disk_util_pct", "net_in_gb", "net_out_gb", "temperature_c", "backup_success", "scheduled_maintenance",
        "avg_rack_temperature_c", "power_usage_mw", "network_latency_ms", "support_tickets", "capacity_used_pct",
        "contract_months", "tenure_days", "monthly_spend_eur"
      ]);

      document.getElementById("prediction-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const inputs = {};
        for (const [key, value] of formData.entries()) {
          inputs[key] = numericFields.has(key) ? Number(value) : value;
        }

        const response = await fetch("/predict", {
          method: "POST",
          cache: "no-store",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ inputs })
        });
        const data = await response.json();
        document.getElementById("summary").textContent = response.ok
          ? `Risk: ${data.risk_level} | probability: ${(data.incident_probability * 100).toFixed(4)}% | prediction: ${data.prediction} | input: ${data.metadata.input_hash}`
          : "Inference failed";
        document.getElementById("output").textContent = JSON.stringify({ updated_at: new Date().toISOString(), sent: inputs, received: data }, null, 2);
      });

      document.getElementById("risky-example").addEventListener("click", () => {
        const values = {
          date: "2026-01-03", server_id: "S000069", server_type: "storage", region: "bhs",
          os_family: "linux", segment: "enterprise", country: "ES", support_plan: "basic",
          cpu_cores: 32, ram_gb: 4, disk_tb: 2.0, age_days: 1806, has_gpu: 0, is_managed: 0,
          cpu_util_pct: 31.22, ram_util_pct: 9.43, disk_util_pct: 78.63, net_in_gb: 71.16,
          net_out_gb: 121.81, temperature_c: 55.3, backup_success: 1, scheduled_maintenance: 0,
          avg_rack_temperature_c: 52.26, power_usage_mw: 0.54, network_latency_ms: 21.86,
          support_tickets: 3, capacity_used_pct: 52.25, contract_months: 24, tenure_days: 1099,
          monthly_spend_eur: 455.71
        };
        for (const [key, value] of Object.entries(values)) {
          const field = document.querySelector(`[name="${key}"]`);
          if (field) field.value = value;
        }
      });
    </script>
  </body>
</html>
